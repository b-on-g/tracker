name: $bog_tracker_mpit_neolo

permissions: write-all

on:
    workflow_dispatch:
    push:
    pull_request:
    delete:

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - uses: hyoo-ru/mam_build@master2
              with:
                  package: "bog/tracker"
                  modules: 'mpit/neolo'

            - uses: hyoo-ru/gh-deploy@v4.4.1
              if: github.ref == 'refs/heads/main'
              with:
                  folder: "bog/tracker/mpit/neolo/-"

